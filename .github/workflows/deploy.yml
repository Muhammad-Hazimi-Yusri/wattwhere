name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci

      - run: npm test

      - name: Verify data artifacts
        run: |
          regions=$(jq '.features | length' public/data/gb-regions.geojson)
          [ "$regions" -ge 14 ] || { echo "gb-regions.geojson has $regions features — seed is missing or stale, run npm run data:regions"; exit 1; }
          power=$(jq '.features | length' public/data/gb-power.geojson)
          [ "$power" -gt 0 ] || { echo "gb-power.geojson has 0 features — seed is missing or stale, run npm run data:osm"; exit 1; }
          echo "data ok: regions=${regions} power=${power}"

      - run: npm run build
        env:
          BASE_PATH: /wattwhere
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
