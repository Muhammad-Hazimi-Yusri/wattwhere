name: Refresh OSM power data and DNO regions

on:
  schedule:
    # 04:00 UTC on the 1st of each month
    - cron: '0 4 1 * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run data:osm
      - run: npm run data:regions
      - name: Commit if changed
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          if git diff --quiet -- public/data/gb-power.geojson public/data/gb-regions.geojson; then
            echo "no changes"
          else
            git add public/data/gb-power.geojson public/data/gb-regions.geojson
            git commit -m "data: refresh GB power infra (OSM) and DNO regions (NESO)"
            git push
          fi
